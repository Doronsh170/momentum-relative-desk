const A=DATA.assets, P=DATA.primary;
const KEY="momentum_desk_finnhub_key_v20", QS="momentum_desk_quotes_v20", HS="momentum_desk_history_v20";
let quotes=load(QS,{}), hist=load(HS,{}), ticker=localStorage.getItem("momentum_desk_ticker_v20")||"", theme=localStorage.getItem("momentum_desk_theme_v20")||"AI Infrastructure", auto=null, busy=false, ctrl=null, peerOpen=false;
function load(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch(e){return f}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function assets(t=theme){return A.filter(x=>x.theme===t)}function matches(t){return A.filter(x=>x.ticker===String(t).toUpperCase())}function primary(t){t=String(t).toUpperCase();return P[t]||(matches(t)[0]?.theme||null)}function q(t){return quotes[String(t).toUpperCase()]||null}
function avg(a){a=a.filter(Number.isFinite);return a.length?a.reduce((x,y)=>x+y,0)/a.length:null}function day(x){return x&&Number.isFinite(x.c)&&Number.isFinite(x.pc)&&x.pc?((x.c/x.pc)-1)*100:null}
function cls(x){if(!Number.isFinite(x))return"wait";return x>0?"pos":x<0?"neg":"wait"}function pct(x){return Number.isFinite(x)?(x>0?"+":"")+x.toFixed(2)+"%":"מחכה"}function price(x){return Number.isFinite(x)?x.toFixed(x>=100?2:3):""}
function addHist(t,p){if(!Number.isFinite(p))return;t=t.toUpperCase();if(!hist[t])hist[t]=[];hist[t].push({t:Date.now(),p});hist[t]=hist[t].filter(x=>x.t>Date.now()-7200000)}
function calc(a){let od=day(q(a.ticker));let pd=avg(assets(a.theme).filter(x=>x.ticker!==a.ticker).map(x=>day(q(x.ticker))));let gd=Number.isFinite(od)&&Number.isFinite(pd)?od-pd:null;return{od,pd,gd}}
function st(c){if(!Number.isFinite(c.gd))return{text:"אין נתונים",cl:"missing"};if(c.gd>=2)return{text:"מובילה",cl:"leader"};if(c.gd>=.5)return{text:"חזקה",cl:"strong"};if(c.gd<=-2)return{text:"מפגרת",cl:"lagging"};return{text:"עם הקבוצה",cl:"missing"}}
function rows(){return assets().map(a=>{let c=calc(a);return{a,c,s:st(c),q:q(a.ticker)}}).sort((x,y)=>(Number.isFinite(y.c.gd)?y.c.gd:-999)-(Number.isFinite(x.c.gd)?x.c.gd:-999))}
function tv(s){return"https://www.tradingview.com/chart/?symbol="+encodeURIComponent(s)}
function note(t){let e=document.getElementById("notice");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),7000)}
function setTicker(t){peerOpen=false;document.getElementById("symbolInput").value=t;find()}
function switchTheme(t){peerOpen=false;theme=t;localStorage.setItem("momentum_desk_theme_v20",theme);render();if(key())fetchGroup("theme")}
function find(){let t=document.getElementById("symbolInput").value.trim().toUpperCase();if(!t){note("הקלד סימבול");return}peerOpen=false;ticker=t;localStorage.setItem("momentum_desk_ticker_v20",t);let p=primary(t);if(!p){render();note(t+" לא נמצא ביקום");return}theme=p;localStorage.setItem("momentum_desk_theme_v20",theme);render();if(key()){fetchGroup("symbol");startAuto()}}
function renderHero(){let e=document.getElementById("hero"),m=matches(ticker);if(!ticker){e.innerHTML='<div class="big" style="direction:rtl">הקלד סימבול</div><div class="meta">בחר מניה וקבל סקטור, תת־סקטור וקישור ישיר לגרף.</div>';return}if(!m.length){e.innerHTML=`<div class="big">${ticker}</div><div class="meta">לא נמצא ביקום.</div>`;return}let a=m.find(x=>x.theme===theme)||m[0];let tabs=m.length>1?'<div class="tabs">'+m.map(x=>`<button class="tab ${x.theme===theme?'active':''}" onclick="switchTheme('${x.theme.replaceAll("'","\\'")}')">${x.theme}</button>`).join("")+"</div>":"";e.innerHTML=`<div class="big">${ticker}</div><div class="group">${theme}</div><div class="meta">${a.name} · ${a.category||""} · תת־סקטור: ${a.theme}</div><div class="tabs"><a class="tab active" target="_blank" href="${tv(a.tvSymbol)}">פתח גרף ב־TradingView</a></div>${tabs}`}
function renderPeers(){let p=assets();document.getElementById("peerCount").textContent=p.length+" מניות";document.getElementById("peers").innerHTML=p.map(a=>`<div class="peer ${a.ticker===ticker?'target':''}" onclick="setTicker('${a.ticker}')"><div class="sym">${a.ticker}</div><div class="nm">${a.name}</div></div>`).join("");let w=document.getElementById("peersWrap"),b=document.getElementById("togglePeersBtn");if(w&&b){w.classList.toggle("hidden",!peerOpen);b.textContent=peerOpen?"סגור קבוצת השוואה":"פתח קבוצת השוואה"}}
function renderDecision(){let r=rows(), have=r.some(x=>Number.isFinite(x.c.od)), lead=r[0], lag=[...r].reverse()[0], tar=r.find(x=>x.a.ticker===ticker);document.getElementById("leaderVal").innerHTML=have&&lead?`<span class="${cls(lead.c.gd)}">${lead.a.ticker} ${pct(lead.c.gd)}</span>`:"מחכה";document.getElementById("laggardVal").innerHTML=have&&lag?`<span class="${cls(lag.c.gd)}">${lag.a.ticker} ${pct(lag.c.gd)}</span>`:"מחכה";document.getElementById("targetVal").innerHTML=tar&&Number.isFinite(tar.c.gd)?`<span class="${cls(tar.c.gd)}">${pct(tar.c.gd)}</span>`:"מחכה"}
function renderTable(){document.getElementById("rows").innerHTML=rows().map(r=>`<tr><td><a class="tv" target="_blank" href="${tv(r.a.tvSymbol)}">${r.a.ticker}</a><div class="nm">${r.a.name}</div></td><td class="hide-mobile">${price(r.q?.c)}</td><td><span class="${cls(r.c.od)} num">${pct(r.c.od)}</span></td><td><span class="${cls(r.c.gd)} num">${pct(r.c.gd)}</span></td><td><span class="badge ${r.s.cl}">${r.s.text}</span></td></tr>`).join("")}
function togglePeers(){peerOpen=!peerOpen;renderPeers()}function render(){renderHero();renderPeers();renderDecision();updateAuto()}
function key(){return(document.getElementById("apiKey").value||localStorage.getItem(KEY)||"").trim()}
async function one(a,k,sig){let url=`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(a.ticker)}&token=${encodeURIComponent(k)}`;let timeout=new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),9000));let res=await Promise.race([fetch(url,{signal:sig}),timeout]);if(res.status===429)throw new Error("429");if(!res.ok)throw new Error("HTTP "+res.status);let d=await res.json();if(!Number.isFinite(d.c)||d.c===0)throw new Error("no price");quotes[a.ticker]={c:+d.c,pc:+d.pc,t:+d.t};addHist(a.ticker,+d.c)}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
async function fetchGroup(src="auto"){if(busy)return;let k=key();if(!k){if(src==="manual")alert("הזן Finnhub API תחת עוד");return}busy=true;ctrl=new AbortController();let b=document.getElementById("refreshBtn");b.disabled=true;b.classList.add("loading");b.textContent="מרענן";let ok=0,fail=0;try{for(let a of assets()){try{await one(a,k,ctrl.signal);ok++;render();await sleep(120)}catch(e){fail++;log(a.ticker+": "+e.message);if(String(e.message).includes("429"))break}}save(QS,quotes);save(HS,hist);let tm=new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit",second:"2-digit"});document.getElementById("lastUpdate").textContent="עודכן: "+tm;log(`Done ok=${ok} fail=${fail}`)}finally{busy=false;ctrl=null;b.disabled=false;b.classList.remove("loading");b.textContent="רענן עכשיו";render()}}
function startAuto(){if(auto)return;auto=setInterval(()=>fetchGroup("auto"),30000);updateAuto()}
function stopAuto(){if(auto)clearInterval(auto);auto=null;if(ctrl)try{ctrl.abort()}catch(e){}updateAuto()}
function toggleAuto(){auto?stopAuto():startAuto()}function updateAuto(){document.getElementById("autoStatus").textContent=auto?"אוטומטי פעיל · כל 30 שניות":"אוטומטי כבוי"}
function saveKey(){let k=document.getElementById("apiKey").value.trim();if(!k){alert("לא הוזן מפתח");return}localStorage.setItem(KEY,k);note("API נשמר");if(ticker){startAuto();fetchGroup("key")}}
function clearKey(){localStorage.removeItem(KEY);document.getElementById("apiKey").value="";stopAuto();note("API נמחק")}
function log(m){let e=document.getElementById("log");if(!e)return;let t=new Date().toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit",second:"2-digit"});e.textContent=`[${t}] ${m}\n`+e.textContent}
function copyTV(){navigator.clipboard.writeText(assets().map(a=>a.tvSymbol).join(",")).then(()=>note("הועתק ל־TradingView"))}
function clearData(){quotes={};hist={};save(QS,quotes);save(HS,hist);render();note("הנתונים נוקו")}
function init(){document.getElementById("apiKey").value=localStorage.getItem(KEY)||"";document.getElementById("symbolInput").value=ticker;document.getElementById("symbolInput").addEventListener("keydown",e=>{if(e.key==="Enter")find()});document.getElementById("findBtn").onclick=find;document.getElementById("refreshBtn").onclick=()=>fetchGroup("manual");document.getElementById("autoBtn").onclick=toggleAuto;document.getElementById("saveKeyBtn").onclick=saveKey;document.getElementById("clearKeyBtn").onclick=clearKey;document.getElementById("clearDataBtn").onclick=clearData;document.getElementById("togglePeersBtn").onclick=togglePeers;render();if(key()&&ticker){startAuto();fetchGroup("init")}}
init();
</script></body></html>
